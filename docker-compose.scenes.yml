# =========================================================
# VisInfer Engine (VIE) - scenes 服务编排：除线标(panel_label)外的全部场景
#
# scenes runtime 基于公共 base，只增加以下 5 个场景插件；
# current/ 用于后续代码与权重热更新：
#   dc_fuse / indicator_light / lap_surf / line_squeeze / plate_screw
# 镜像构建：bash scripts/release/build_docker_release.sh --service scenes <版本>
# 启动：    docker compose -f docker-compose.scenes.yml up -d        # ←【不要】加 --build
# 推场景：  bash scripts/release/sync-plugin-scenes.sh               # 编译5场景 .so + 推 pkg/weights → 重启
# 查看日志：docker compose -f docker-compose.scenes.yml logs -f
# 停止：    docker compose -f docker-compose.scenes.yml down
#
# 容器名加 -scenes 后缀，可与 panel-label 服务（端口 3001）并存。
# =========================================================

services:
  mobile-vision-scenes:
    image: ${SCENES_IMAGE:-mobile_vision:scenes}
    container_name: mobile-vision-scenes

    # panel-label 占用 3001；本服务用 3005 以便同机并存。单独部署可改回 3001。
    ports:
      - "3005:3001"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ONNX_REQUIRE_CUDA=true
      - STRICT_STARTUP=true
      - INFERENCE_MAX_CONCURRENCY=1
      - INDICATOR_ALLOWED_HOSTS=${INDICATOR_ALLOWED_HOSTS:-}
      # 场景白名单：仅注册/预加载这 5 个场景；未列出的（如 panel_label）即便代码在镜像里也不启用。
      # 改部署场景只动这一行（JSON 数组，pydantic-settings 解析为 set）。
      - ENABLED_SCENES=["dc_fuse","indicator_light","lap_surf","line_squeeze","plate_screw"]
      # current/pkg 非空时覆盖镜像内置场景插件。
      - PYTHONPATH=/app/workspace/pkg

    volumes:
      # 运行日志（按天切分）持久化到宿主
      - ./logs:/app/workspace/logs
      # 数据回流图片 + 记录（按 场景/型号/ok|ng 分目录）持久化到宿主
      - ./data:/app/workspace/data
      - ./current/pkg:/app/workspace/pkg:ro
      - ./current/app.py:/app/workspace/app.py:ro
      - ./current/static:/app/workspace/static:ro
      - ./current/weights:/app/workspace/weights:ro

    restart: unless-stopped

    # 就绪探针：所有启用场景模型预加载成功才算就绪。
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    # 共享内存用于图像处理和批量推理。
    shm_size: "2gb"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
