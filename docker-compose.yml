# =========================================================
# VisInfer Engine (VIE) - Docker Compose
#
# 常用命令：
#   构建并启动：  docker compose up -d --build
#   查看日志：    docker compose logs -f
#   停止：        docker compose down
#   仅构建镜像：  docker compose build
# =========================================================

services:
  mobile-vision:
    build:
      context: .
      dockerfile: Dockerfile
    image: mobile_vision:latest
    container_name: mobile-vision

    # ----- 端口映射 -----
    ports:
      - "3001:3001"

    # ----- GPU 配置（NVIDIA Container Toolkit） -----
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1            # 分配 1 张 GPU；如需全部改为 "all"
              capabilities: [gpu]

    # ----- 环境变量 -----
    environment:
      - TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # ----- 持久化日志与运行数据 -----
    # 容器内 /app/workspace/logs → 宿主机 ./logs
    # 容器内 /app/workspace/data → 宿主机 ./data（回流图片、记录、stats.db）
    # 模型权重已打包进镜像，无需额外挂载
    volumes:
      - ./logs:/app/workspace/logs
      - ./data:/app/workspace/data

    # ----- 重启策略 -----
    restart: unless-stopped

    # ----- 健康检查（与 Dockerfile 保持一致） -----
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 120s      # 大模型加载需要时间
      retries: 3

    # ----- 共享内存（paddlepaddle 多进程推理需要） -----
    shm_size: "2gb"

    # ----- 资源限制（可选，防止 OOM） -----
    # mem_limit: "8g"
    # cpus: "4"

    # ----- 日志驱动配置（防止日志文件无限增长） -----
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
