# =========================================================
# VisInfer Engine (VIE) - 精简编排：仅 panel_label（线标 OCR）场景
#
# 构建并启动：  docker compose -f docker-compose.panel-label.yml up -d --build
# 查看日志：    docker compose -f docker-compose.panel-label.yml logs -f
# 停止：        docker compose -f docker-compose.panel-label.yml down
#
# 与主 docker-compose.yml 的唯一区别：dockerfile 指向 Dockerfile.panel-label，
# 镜像/容器名加 -panel-label 后缀以便与全量镜像共存。
# =========================================================

services:
  mobile-vision-panel-label:
    build:
      context: .
      dockerfile: Dockerfile.panel-label
    image: mobile_vision:panel-label
    container_name: mobile-vision-panel-label

    ports:
      - "3001:3001"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # 业务代码热更新覆盖层：PYTHONPATH 排在 site-packages 之前，pkg/ 里的新 .so
      # 包会盖掉镜像内置旧版；pkg/ 为空则自动回退镜像内置版（全新部署无需 pkg/）。
      - PYTHONPATH=/app/workspace/pkg

    volumes:
      # 运行日志（按天切分）持久化到宿主
      - ./logs:/app/workspace/logs
      # 数据回流图片 + 记录（按 型号/ok|ng 分目录）持久化到宿主，避免随容器重建丢失
      - ./data:/app/workspace/data
      # 业务 .so 热更新层：scripts/sync-plugin.sh 同步编译后的包到此，restart 即生效，
      # 免去重打整镜像（几个 G）重传。只读挂载，容器无法改写宿主交付物。
      - ./pkg:/app/workspace/pkg:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3007/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    shm_size: "2gb"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
