# =========================================================
# VisInfer Engine (VIE) - 精简编排：仅 panel_label（线标 OCR）场景
#
# 启动：        docker compose -f docker-compose.panel-label.yml up -d
# 查看日志：    docker compose -f docker-compose.panel-label.yml logs -f
# 停止：        docker compose -f docker-compose.panel-label.yml down
#
# 镜像内置 framework + panel_label 基线插件；current/ 是后续原子热更新覆盖层。
# =========================================================

services:
  mobile-vision-panel-label:
    image: ${PANEL_LABEL_IMAGE:-mobile_vision:panel-label}
    container_name: mobile-vision-panel-label

    ports:
      - "3001:3001"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ONNX_REQUIRE_CUDA=true
      - STRICT_STARTUP=true
      - INFERENCE_MAX_CONCURRENCY=1
      - ENABLED_SCENES=["panel_label"]
      # current/pkg 优先于镜像 site-packages；为空时回退镜像内置基线插件。
      - PYTHONPATH=/app/workspace/pkg

    volumes:
      # 运行日志（按天切分）持久化到宿主
      - ./logs:/app/workspace/logs
      # 数据回流图片 + 记录（按 型号/ok|ng 分目录）持久化到宿主，避免随容器重建丢失
      - ./data:/app/workspace/data
      - ./current/pkg:/app/workspace/pkg:ro
      - ./current/app.py:/app/workspace/app.py:ro
      - ./current/static:/app/workspace/static:ro
      - ./current/weights:/app/workspace/weights:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    shm_size: "2gb"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
